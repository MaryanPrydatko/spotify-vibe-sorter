<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify Vibe Sorter</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1014;
        --panel: #181a20;
        --fg: #e8e9ed;
        --muted: #9aa0aa;
        --accent: #1db954;
        --border: #262932;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        min-height: 100vh;
        justify-content: center;
      }
      main {
        width: 100%;
        max-width: 720px;
        padding: 48px 24px;
      }
      h1 { font-size: 28px; margin: 0 0 4px; }
      .sub { color: var(--muted); margin: 0 0 32px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }
      .status { color: var(--muted); font-size: 14px; }
      .ok { color: var(--accent); }
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex: none;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      button:disabled { opacity: 0.55; cursor: default; }
    </style>
  </head>
  <body>
    <main>
      <h1>Spotify Vibe Sorter</h1>
      <p class="sub">Sort your scattered library into vibe playlists — and meet your music personality.</p>
      <div class="panel">
        <div id="app" class="status">Loading…</div>
      </div>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
